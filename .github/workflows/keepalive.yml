name: Admin Panel Keep-Alive Cron

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (inactivity limit is 15 mins)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Admin API Endpoint
        run: |
          echo "Pinging nidripcentral-1.onrender.com to keep it awake..."
          curl -s -i "https://nidripcentral-1.onrender.com/" > /dev/null
          curl -s -i "https://nidripbackend.onrender.com/" > /dev/null || true
          echo "Ping complete."
